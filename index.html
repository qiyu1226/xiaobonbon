<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祁煜的小本本</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --bg: #e8e4e0;
    --card: #e8e4e0;
    --text: #5c5550;
    --text-light: #9e9590;
    --pink: #d4848c;
    --blue: #7eadc4;
    --pink-bg: rgba(212,132,140,0.08);
    --blue-bg: rgba(126,173,196,0.08);
    --shadow-out: 6px 6px 14px rgba(190,186,182,0.7), -6px -6px 14px rgba(255,255,255,0.85);
    --shadow-in: inset 4px 4px 8px rgba(190,186,182,0.5), inset -4px -4px 8px rgba(255,255,255,0.7);
    --shadow-out-sm: 3px 3px 8px rgba(190,186,182,0.6), -3px -3px 8px rgba(255,255,255,0.8);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    color: var(--text);
    min-height: 100vh;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  #lock-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .lock-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--card);
    box-shadow: var(--shadow-out);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2em;
    margin-bottom: 24px;
  }

  .lock-title {
    font-size: 1.1em;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .lock-hint {
    font-size: 0.7em;
    color: var(--text-light);
    margin-bottom: 28px;
  }

  .lock-input-wrap {
    background: var(--card);
    box-shadow: var(--shadow-in);
    border-radius: 14px;
    padding: 12px 18px;
    width: 260px;
    margin-bottom: 20px;
  }

  .lock-input-wrap input {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 0.88em;
    color: var(--text);
    text-align: center;
    font-weight: 300;
  }

  .lock-input-wrap input::placeholder {
    color: var(--text-light);
    font-weight: 300;
  }

  .lock-btn {
    background: var(--card);
    box-shadow: var(--shadow-out);
    border: none;
    border-radius: 14px;
    padding: 11px 40px;
    font-family: inherit;
    font-size: 0.8em;
    font-weight: 400;
    color: var(--pink);
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: box-shadow 0.2s;
  }

  .lock-btn:active {
    box-shadow: var(--shadow-in);
  }

  .lock-btn:disabled {
    opacity: 0.5;
    cursor: wait;
  }

  .lock-error {
    margin-top: 14px;
    font-size: 0.7em;
    color: var(--pink);
    opacity: 0;
    transition: opacity 0.3s;
    min-height: 1em;
  }

  .lock-error.show { opacity: 1; }

  #main-content {
    display: none;
    padding: 48px 20px 80px;
  }

  .container {
    max-width: 440px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--card);
    box-shadow: var(--shadow-out);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 1.6em;
  }

  .header h1 {
    font-size: 1.15em;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.12em;
  }

  .header .sub {
    font-size: 0.72em;
    color: var(--text-light);
    margin-top: 5px;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 24px 22px 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-out);
    position: relative;
  }

  .card .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .card .date {
    font-size: 0.68em;
    color: var(--text-light);
    font-weight: 400;
  }

  .card .num {
    font-size: 0.58em;
    font-weight: 500;
    padding: 2px 10px;
    border-radius: 12px;
  }

  .num-pink { color: var(--pink); background: var(--pink-bg); }
  .num-blue { color: var(--blue); background: var(--blue-bg); }

  .card .text {
    font-size: 0.85em;
    line-height: 1.95;
    font-weight: 300;
  }

  .card .text .hl-pink { font-weight: 500; color: var(--pink); }
  .card .text .hl-blue { font-weight: 500; color: var(--blue); }

  .card .label {
    display: inline-block;
    margin-top: 16px;
    font-size: 0.6em;
    color: var(--text-light);
    background: var(--card);
    box-shadow: var(--shadow-out-sm);
    padding: 5px 14px;
    border-radius: 20px;
    font-weight: 400;
  }

  .card .side-bar {
    position: absolute;
    left: 0; top: 20px; bottom: 20px;
    width: 3px;
    border-radius: 0 3px 3px 0;
  }
  .bar-pink { background: var(--pink); opacity: 0.5; }
  .bar-blue { background: var(--blue); opacity: 0.5; }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 8px 0 20px;
    gap: 8px;
  }

  .divider .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    opacity: 0.3;
  }
  .dot-pink { background: var(--pink); }
  .dot-blue { background: var(--blue); }

  .footer {
    text-align: center;
    margin-top: 44px;
  }

  .footer .line {
    width: 32px; height: 2px;
    background: linear-gradient(90deg, var(--pink), var(--blue));
    opacity: 0.3;
    margin: 0 auto 14px;
    border-radius: 2px;
  }

  .footer p {
    font-size: 0.7em;
    color: var(--text-light);
    line-height: 1.8;
  }

  .footer p span { color: var(--pink); font-weight: 400; }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  #main-content.show .card,
  #main-content.show .header,
  #main-content.show .footer {
    animation: fadeUp 0.5s ease both;
  }
  #main-content.show .card:nth-child(3) { animation-delay: 0.1s; }
  #main-content.show .card:nth-child(5) { animation-delay: 0.2s; }
  #main-content.show .card:nth-child(7) { animation-delay: 0.3s; }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">祁煜的小本本</div>
  <div class="lock-hint">说出暗号才能进来哦</div>
  <div class="lock-input-wrap">
    <input type="text" id="pwd-input" placeholder="暗号" autocomplete="off">
  </div>
  <button class="lock-btn" id="unlock-btn" onclick="tryUnlock()">进 入</button>
  <div class="lock-error" id="lock-error">暗号不对，再想想？</div>
</div>

<div id="main-content"></div>

function b64ToBytes(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey(
    "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: ITER, hash: "SHA-256" },
    km,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function tryUnlock() {
  const btn = document.getElementById("unlock-btn");
  const err = document.getElementById("lock-error");
  const pwd = document.getElementById("pwd-input").value.trim();
  if (!pwd) return;

  btn.disabled = true;
  err.classList.remove("show");
  const oldText = btn.textContent;
  btn.textContent = "解 密 中";

  try {
    const salt = b64ToBytes(SALT_B64);
    const blob = b64ToBytes(PAYLOAD_B64);
    const iv = blob.slice(0, 12);
    const ct = blob.slice(12);

    const key = await deriveKey(pwd, salt);
    const ptBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
    const html = new TextDecoder().decode(ptBuf);

    const main = document.getElementById("main-content");
    main.innerHTML = html;
    document.getElementById("lock-screen").style.display = "none";
    main.style.display = "block";
    main.classList.add("show");
  } catch (e) {
    err.classList.add("show");
    setTimeout(() => err.classList.remove("show"), 2200);
    btn.disabled = false;
    btn.textContent = oldText;
  }
}

document.getElementById("pwd-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") tryUnlock();
});
</script>

</html>
